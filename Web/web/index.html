<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>PS5-MemoryPeeker Web</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-alt: #fafbfc;
      --ink: #111820;
      --muted: #68737d;
      --line: #d7dee6;
      --line-soft: #edf0f3;
      --accent: #1677ff;
      --accent-hover: #0f69e8;
      --accent-pressed: #0b58c7;
      --danger: #d92d20;
      --success: #128a4c;
      --gold: #c79b2b;
      --control-h: 42px;
      --shadow: 0 12px 36px rgba(17, 24, 32, .12);
      --progress-image: url('{{PROGRESS_DATA_URI}}');
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #000000;
      --surface: #000000;
      --surface-alt: #06090d;
      --ink: #f5f8fc;
      --muted: #a5b0bc;
      --line: #24303d;
      --line-soft: #17202a;
      --accent: #1488ff;
      --accent-hover: #0878e8;
      --accent-pressed: #0765c3;
      --danger: #ff5a52;
      --success: #00e676;
      --gold: #e3b94a;
      --shadow: 0 12px 36px rgba(0, 0, 0, .65);
    }

    * { box-sizing: border-box; letter-spacing: 0; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.35 Satoshi, "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    button, input, select { font: inherit; color: inherit; }
    button, input, select {
      height: var(--control-h);
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--surface);
    }
    input, select { min-width: 0; padding: 0 12px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    button {
      padding: 0 18px;
      cursor: pointer;
      transition: background-color .14s ease, border-color .14s ease, color .14s ease, opacity .14s ease;
    }
    button:hover { background: var(--surface-alt); }
    button:disabled { cursor: default; opacity: .48; }
    button.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
    button.primary:hover { color: #fff; background: var(--accent-hover); border-color: var(--accent-hover); }
    button.primary:active { color: #fff; background: var(--accent-pressed); border-color: var(--accent-pressed); }
    button.danger { color: var(--danger); border-color: var(--danger); }
    button.compact { padding: 0 12px; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto auto minmax(370px, 1fr) minmax(230px, 32vh) 32px; }
    .titlebar {
      min-height: 58px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .titlebar h1 { margin: 0; font-size: 23px; font-weight: 500; }

    .toolbar {
      display: grid;
      grid-template-columns: 168px minmax(190px, 1.25fr) 112px minmax(115px, .8fr) 176px minmax(230px, 1.5fr) 142px 142px;
      grid-template-rows: var(--control-h) var(--control-h);
      gap: 0 10px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      align-items: center;
    }
    .connection { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .connection strong { font-weight: 500; }
    #connectionState { color: var(--success); }
    .eboot {
      height: var(--control-h);
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      white-space: nowrap;
    }
    .eboot .emoji { margin-left: 7px; font-family: "Segoe UI Emoji", sans-serif; }
    .subtools { grid-column: 2 / 5; display: flex; align-items: center; gap: 18px; height: 100%; }
    .check { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; cursor: pointer; }
    .check input { width: 18px; height: 18px; margin: 0; accent-color: var(--accent); }
    .settings-tools { grid-column: 5; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
    .theme-wrap { position: relative; width: 100%; }
    #themeButton { width: 100%; }
    #soundButton { width: 100%; padding: 0 8px; }
    #soundButton.muted { color: var(--danger); border-color: var(--danger); }
    .menu {
      position: absolute;
      z-index: 20;
      top: calc(100% + 3px);
      left: 0;
      width: 100%;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .menu[hidden] { display: none; }
    .menu button { display: block; width: 100%; margin: 0 0 4px; }
    .menu button:last-child { margin-bottom: 0; }
    .progress-shell { grid-column: 6 / 8; display: grid; grid-template-columns: 1fr 45px; align-items: center; gap: 10px; }
    .progress-track {
      position: relative;
      height: 20px;
      overflow: hidden;
      background-image: var(--progress-image);
      background-size: 100% 100%;
      background-repeat: no-repeat;
      opacity: .18;
    }
    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      overflow: hidden;
      transition: width .24s cubic-bezier(.2,.7,.2,1);
      opacity: 1;
    }
    .progress-fill::before {
      content: "";
      display: block;
      width: var(--progress-track-width, 900px);
      height: 100%;
      background-color: var(--gold);
      -webkit-mask-image: var(--progress-image);
      mask-image: var(--progress-image);
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
    }
    #progressText { font-variant-numeric: tabular-nums; }

    .workspace { min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 12px; padding: 12px 14px 0; }
    .table-shell, .memory-panel { border: 1px solid var(--line); background: var(--surface); min-height: 0; overflow: hidden; }
    .table-scroll { width: 100%; height: 100%; overflow: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { height: 32px; padding: 5px 9px; text-align: left; border-bottom: 1px solid var(--line-soft); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 400; }
    th { position: sticky; top: 0; z-index: 2; background: var(--surface); color: var(--ink); }
    tbody tr { cursor: default; }
    tbody tr:hover { background: color-mix(in srgb, var(--accent) 7%, var(--surface)); }
    tbody tr.selected { background: color-mix(in srgb, var(--accent) 14%, var(--surface)); }
    .combined-table input[type="text"] { width: 100%; height: 28px; border: 0; background: transparent; color: var(--ink); padding: 0 4px; }
    .combined-table input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); }
    .combined-table tr.cheat-row { background: color-mix(in srgb, var(--success) 8%, var(--surface)); }
    .address-col { width: 170px; } .type-col { width: 105px; } .value-col { width: 135px; } .hex-col { width: 160px; }
    .on-col { width: 52px; } .lock-col { width: 68px; } .desc-col { width: 220px; }

    .memory-panel { padding: 16px; display: grid; grid-template-rows: auto var(--control-h) minmax(0, 1fr) auto; gap: 12px; }
    .memory-head { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center; }
    .memory-head h2 { margin: 0; font-size: 17px; font-weight: 500; }
    .section-list { overflow: auto; border: 1px solid var(--line); background: var(--surface-alt); }
    .section-row {
      min-height: 38px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 5px 9px;
      border-bottom: 1px solid var(--line-soft);
    }
    .section-row:last-child { border-bottom: 0; }
    .section-row input { width: 17px; height: 17px; accent-color: var(--accent); }
    .section-name { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .section-size { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .memory-totals { display: grid; grid-template-columns: auto 1fr auto 1fr; gap: 8px; align-items: center; }
    .counter { height: var(--control-h); display: flex; align-items: center; padding: 0 12px; border: 1px solid var(--line); font-variant-numeric: tabular-nums; }

    .cheats { min-height: 0; padding: 12px 14px 0; display: block; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .actions button { min-width: 112px; }
    .actions .gap { margin-left: 14px; }

    .statusbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border-top: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      overflow: hidden;
    }
    #statusMessage { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    #scanTime { font-variant-numeric: tabular-nums; }

    .empty { padding: 18px; color: var(--muted); text-align: center; }
    .mobile-only { display: none; }
    #loadFile { display: none; }
    .startup-fold { position: fixed; inset: 0; z-index: 1000; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; pointer-events: all; perspective: 1200px; }
    .startup-fold.done { pointer-events: none; }
    .fold-panel { background: linear-gradient(145deg, #fbfcfe, #edf2f7 48%, #fff); border: 1px solid #d7dee6; transform-origin: var(--origin); animation: unfold-panel .56s cubic-bezier(.65,0,.25,1) forwards; animation-delay: var(--delay); }
    .fold-panel:nth-child(1) { --origin: 100% 100%; --delay: 0s; }
    .fold-panel:nth-child(2) { --origin: 0 100%; --delay: .33s; }
    .fold-panel:nth-child(3) { --origin: 100% 0; --delay: .66s; }
    .fold-panel:nth-child(4) { --origin: 0 0; --delay: .99s; }
    @keyframes unfold-panel { 0% { opacity: .98; transform: rotateY(0) skewX(0); } 60% { opacity: .84; transform: rotateY(72deg) skewX(4deg); } 100% { opacity: 0; transform: rotateY(89deg) scaleX(.02); visibility: hidden; } }

    @media (max-width: 1540px) {
      .app { grid-template-rows: auto auto auto auto 32px; }
      .toolbar { grid-template-columns: repeat(4, minmax(130px, 1fr)); grid-template-rows: repeat(4, var(--control-h)); gap: 8px 10px; }
      .connection { grid-column: 1; } .eboot { grid-column: 2; }
      #refreshButton { grid-column: 3; } #valueInput { grid-column: 1; grid-row: 2; }
      #valueType { grid-column: 2; grid-row: 2; } #compareType { grid-column: 3; grid-row: 2; }
      #firstScanButton { grid-column: 4; grid-row: 1; } #nextScanButton { grid-column: 4; grid-row: 2; }
      .subtools { grid-column: 1 / 3; grid-row: 3; }
      .settings-tools { grid-column: 3 / 5; grid-row: 3; }
      .progress-shell { grid-column: 1 / 5; grid-row: 4; }
      .workspace { grid-template-columns: 1fr; grid-template-rows: minmax(400px, 58vh) minmax(360px, 48vh); }
      .memory-panel { margin: 0; }
      .cheats { min-height: 0; }
    }

    @media (max-width: 720px) {
      :root { --control-h: 44px; }
      .titlebar { min-height: 54px; padding: 0 12px; }
      .titlebar h1 { font-size: 20px; }
      .toolbar { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(7, var(--control-h)); padding: 10px; gap: 8px; }
      .connection { grid-column: 1; } .eboot { grid-column: 2; }
      #refreshButton { grid-column: 1; grid-row: 2; }
      #valueInput { grid-column: 1 / 3; grid-row: 3; }
      #valueType { grid-column: 1; grid-row: 4; } #compareType { grid-column: 2; grid-row: 4; }
      #firstScanButton { grid-column: 1; grid-row: 5; } #nextScanButton { grid-column: 2; grid-row: 5; }
      .subtools { grid-column: 1 / 3; grid-row: 6; }
      .settings-tools { grid-column: 2; grid-row: 2; }
      .progress-shell { grid-column: 1 / 3; grid-row: 7; }
      .workspace { padding: 8px 8px 0; grid-template-rows: minmax(380px, 60vh) minmax(390px, 58vh); }
      .memory-panel { padding: 12px; }
      .memory-head { grid-template-columns: 1fr auto; }
      .memory-head .filter-check { display: none; }
      .cheats { padding: 8px 8px 0; min-height: 0; }
      .actions { display: grid; grid-template-columns: repeat(4, 1fr); }
      .actions button { min-width: 0; padding: 0 8px; }
      .actions .gap { margin-left: 0; }
      .statusbar { padding: 0 8px; }
      .hex-col, .desc-col { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="titlebar"><h1>PS5-MemoryPeeker Web</h1></header>

    <section class="toolbar" aria-label="Memory scanner controls">
      <div class="connection"><strong>Status:</strong><span id="connectionState">Connected</span></div>
      <div class="eboot"><span id="ebootText">EBOOT WAITING</span><span id="ebootEmoji" class="emoji">❌</span></div>
      <button id="refreshButton" type="button">Refresh</button>
      <input id="valueInput" autocomplete="off" inputmode="decimal" placeholder="Value" aria-label="Scan value">
      <select id="valueType" aria-label="Value type">
        <option value="1">1 byte</option>
        <option value="2">2 bytes</option>
        <option value="4" selected>4 bytes</option>
        <option value="8">8 bytes</option>
        <option value="pointer">Pointer</option>
        <option value="float">Float</option>
        <option value="double">Double</option>
        <option value="hex">Hex</option>
        <option value="string">String</option>
      </select>
      <select id="compareType" aria-label="Compare type">
        <option value="exact">Exact Value</option>
        <option value="fuzzy">Fuzzy Value</option>
        <option value="bigger">Bigger Than</option>
        <option value="smaller">Smaller Than</option>
        <option value="between">Between Value</option>
        <option value="unknown">Unknown Initial Value</option>
      </select>
      <button id="firstScanButton" class="primary" type="button">First Scan</button>
      <button id="nextScanButton" class="primary" type="button">Next Scan</button>

      <div class="subtools">
        <label class="check"><input id="alignmentInput" type="checkbox" checked>Alignment</label>
        <label class="check"><input id="autoPauseInput" type="checkbox">Auto pause</label>
        <button id="stopScanButton" class="compact" type="button" disabled>Stop</button>
      </div>
      <div class="settings-tools">
        <div class="theme-wrap">
          <button id="themeButton" type="button" aria-haspopup="true" aria-expanded="false">Theme</button>
          <div id="themeMenu" class="menu" hidden>
            <button type="button" data-theme-choice="light">Light</button>
            <button type="button" data-theme-choice="dark">Dark</button>
          </div>
        </div>
        <button id="soundButton" type="button" aria-pressed="false" title="Mute background music">Sound 🔊</button>
      </div>
      <div class="progress-shell">
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <span id="progressText">0%</span>
      </div>
    </section>

    <main class="workspace">
      <section class="table-shell" aria-label="Scan results">
        <div class="table-scroll">
          <table id="resultsTable" class="combined-table">
            <thead><tr><th class="on-col">On</th><th class="address-col">Address</th><th class="type-col">Type</th><th class="value-col">Value</th><th class="hex-col">Hex</th><th>Section</th><th class="lock-col">Lock</th><th class="desc-col">Description</th></tr></thead>
            <tbody id="resultsBody"><tr><td class="empty" colspan="8">No scan results.</td></tr></tbody>
          </table>
        </div>
      </section>

      <aside class="memory-panel">
        <div class="memory-head">
          <h2>Process Memory</h2>
          <label class="check"><input id="selectAllInput" type="checkbox">Select All</label>
          <label class="check filter-check"><input id="filterEnabledInput" type="checkbox" checked>Filter</label>
        </div>
        <input id="sectionFilterInput" value="anon, exe, Game, dlmalloc, Sce" aria-label="Section filter">
        <div id="sectionList" class="section-list"><div class="empty">Refresh to load EBOOT memory.</div></div>
        <div class="memory-totals"><span>Selected:</span><div id="selectedCount" class="counter">0</div><span>Total:</span><div id="totalCount" class="counter">0</div></div>
      </aside>
    </main>

    <section class="cheats" aria-label="Cheat actions">
      <div class="actions">
        <button id="newCheatButton" type="button">New</button>
        <button id="refreshCheatsButton" type="button">Refresh</button>
        <button id="saveCheatsButton" type="button">Save</button>
        <button id="loadCheatsButton" type="button">Load</button>
        <button id="pauseButton" class="gap" type="button">Pause</button>
        <button id="resumeButton" type="button">Resume</button>
        <button id="killButton" class="danger" type="button">Kill</button>
        <button id="exportButton" class="primary" type="button">Export</button>
        <input id="loadFile" type="file" accept="application/json,.json">
      </div>
    </section>

    <footer class="statusbar"><span id="statusMessage">Ready.</span><span id="scanTime">-</span></footer>
  </div>

  <div id="startupFold" class="startup-fold" aria-hidden="true">
    <div class="fold-panel"></div><div class="fold-panel"></div><div class="fold-panel"></div><div class="fold-panel"></div>
  </div>
  <audio id="backgroundMusic" src="/assets/music.mp3" loop preload="auto"></audio>
  <audio id="foldSound" src="/assets/fold.mp3" preload="auto"></audio>

  <script>
    const $ = id => document.getElementById(id);
    const state = { sections: [], results: [], cheats: [], selectedResult: -1, scanStarted: 0, scanTimer: 0, eboot: false, titleId: 'UNKNOWN', writingLocks: false, musicMuted: false, musicStarted: false, startupDone: false };
    const firstCompare = [
      ['exact','Exact Value'],['fuzzy','Fuzzy Value'],['bigger','Bigger Than'],['smaller','Smaller Than'],['between','Between Value'],['unknown','Unknown Initial Value']
    ];
    const nextCompare = [
      ['exact','Exact Value'],['fuzzy','Fuzzy Value'],['increased','Increased Value'],['increasedby','Increased Value By'],
      ['decreased','Decreased Value'],['decreasedby','Decreased Value By'],['bigger','Bigger Than'],['smaller','Smaller Than'],
      ['changed','Changed Value'],['unchanged','Unchanged Value'],['between','Between Value']
    ];

    function setStatus(message, ok = false) {
      $('statusMessage').textContent = message;
      $('statusMessage').style.color = ok ? 'var(--success)' : 'var(--muted)';
    }

    function tryStartMusic() {
      if (!state.startupDone || state.musicMuted || state.musicStarted) return;
      const music = $('backgroundMusic');
      music.volume = .34;
      const started = music.play();
      if (started && typeof started.then === 'function') {
        started.then(() => { state.musicStarted = true; }).catch(() => {});
      } else {
        state.musicStarted = true;
      }
    }

    function runStartupAudio() {
      const source = $('foldSound');
      [0, 330, 660, 990].forEach(delay => setTimeout(() => {
        const sound = source.cloneNode(true);
        sound.volume = .48;
        sound.play().catch(() => {});
      }, delay));
      setTimeout(() => {
        $('startupFold').classList.add('done');
        $('startupFold').remove();
        state.startupDone = true;
        tryStartMusic();
      }, 1600);
    }

    function toggleSound() {
      const button = $('soundButton');
      const music = $('backgroundMusic');
      state.musicMuted = !state.musicMuted;
      button.classList.toggle('muted', state.musicMuted);
      button.setAttribute('aria-pressed', String(state.musicMuted));
      button.textContent = state.musicMuted ? 'Sound 🔇' : 'Sound 🔊';
      button.title = state.musicMuted ? 'Resume background music' : 'Mute background music';
      if (state.musicMuted) music.pause();
      else { state.musicStarted = false; tryStartMusic(); }
    }

    async function api(path, options = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), options.timeout || 10000);
      try {
        const response = await fetch(path, { cache: 'no-store', signal: controller.signal });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || data.error || `HTTP ${response.status}`);
        return data;
      } finally { clearTimeout(timeout); }
    }

    function typeLabel(type) {
      return ({'1':'1 byte','2':'2 bytes','4':'4 bytes','8':'8 bytes',float:'Float',double:'Double',hex:'Hex',string:'String'})[String(type)] || '4 bytes';
    }

    function setCompareOptions(items, selected = 'exact') {
      $('compareType').replaceChildren(...items.map(([value, label]) => {
        const option = document.createElement('option'); option.value = value; option.textContent = label; return option;
      }));
      $('compareType').value = selected;
    }

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      const track = document.querySelector('.progress-track');
      $('progressFill').style.setProperty('--progress-track-width', `${track.clientWidth}px`);
      $('progressFill').style.width = `${value}%`;
      $('progressText').textContent = `${Math.round(value)}%`;
      document.querySelector('.progress-track').setAttribute('aria-valuenow', String(Math.round(value)));
    }

    function setScanning(running) {
      $('firstScanButton').disabled = running;
      $('nextScanButton').disabled = running;
      $('refreshButton').disabled = running;
      $('stopScanButton').disabled = !running;
    }

    function updateEboot(found) {
      state.eboot = !!found;
      $('ebootText').textContent = found ? 'EBOOT HOOKED' : 'EBOOT WAITING';
      $('ebootEmoji').textContent = found ? '✅' : '❌';
      $('ebootEmoji').style.color = found ? 'var(--success)' : 'var(--danger)';
    }

    async function pollStatus() {
      try {
        const status = await api('/api/status', { timeout: 3000 });
        $('connectionState').textContent = 'Connected';
        $('connectionState').style.color = 'var(--success)';
        const appeared = !state.eboot && status.ebootFound;
        updateEboot(status.ebootFound);
        state.titleId = status.titleId || state.titleId;
        if (appeared) await refreshMemory(true);
      } catch (_) {
        $('connectionState').textContent = 'Disconnected';
        $('connectionState').style.color = 'var(--danger)';
        updateEboot(false);
      }
    }

    function visibleSections() {
      if (!$('filterEnabledInput').checked) return state.sections;
      const tokens = $('sectionFilterInput').value.split(',').map(x => x.trim().toLowerCase()).filter(Boolean);
      if (!tokens.length) return state.sections;
      const filtered = state.sections.filter(section => tokens.some(token => `${section.name} ${section.kind}`.toLowerCase().includes(token)));
      return filtered.length ? filtered : state.sections;
    }

    function renderSections() {
      const list = $('sectionList');
      const shown = visibleSections();
      list.replaceChildren();
      if (!shown.length) { list.innerHTML = '<div class="empty">No readable memory sections.</div>'; }
      for (const section of shown) {

    $('filterEnabledInput').addEventListener('change', renderSections);
    $('selectAllInput').addEventListener('change', async event => {
      try { const result = await api(`/api/sections/select-all?selected=${event.target.checked ? 1 : 0}`); state.sections.forEach(section => section.selected = result.selected); renderSections(); setStatus(`${result.count} memory sections selected.`, true); }
      catch (error) { setStatus(error.message); }
    });
    $('themeButton').addEventListener('click', () => { const menu = $('themeMenu'); menu.hidden = !menu.hidden; $('themeButton').setAttribute('aria-expanded', String(!menu.hidden)); });
    $('soundButton').addEventListener('click', toggleSound);
    document.querySelectorAll('[data-theme-choice]').forEach(button => button.addEventListener('click', () => { const theme = button.dataset.themeChoice; document.documentElement.dataset.theme = theme; localStorage.setItem('ps5mp-theme', theme); $('themeMenu').hidden = true; }));
    document.addEventListener('click', event => { if (!event.target.closest('.theme-wrap')) $('themeMenu').hidden = true; });
    $('newCheatButton').addEventListener('click', newCheat);
    $('refreshCheatsButton').addEventListener('click', refreshCheats);
    $('saveCheatsButton').addEventListener('click', saveCheats);
    $('loadCheatsButton').addEventListener('click', () => $('loadFile').click());
    $('loadFile').addEventListener('change', event => event.target.files[0] && loadCheats(event.target.files[0]));
    $('pauseButton').addEventListener('click', () => processAction('pause'));
    $('resumeButton').addEventListener('click', () => processAction('resume'));
    $('killButton').addEventListener('click', () => processAction('kill'));
    $('exportButton').addEventListener('click', exportCheats);
    $('valueInput').addEventListener('keydown', event => { if (event.key === 'Enter') startScan(state.results.length ? 'next' : 'first'); });

    document.documentElement.dataset.theme = localStorage.getItem('ps5mp-theme') === 'dark' ? 'dark' : 'light';
    addEventListener('pointerdown', tryStartMusic);
    addEventListener('keydown', tryStartMusic);
    addEventListener('resize', () => setProgress(parseFloat($('progressText').textContent) || 0));
    setCompareOptions(firstCompare); renderCheats(); setProgress(0); pollStatus();
    runStartupAudio();
    setInterval(pollStatus, 1800); setInterval(lockTick, 600);
  </script>
</body>
</html>
